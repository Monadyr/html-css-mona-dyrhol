  <style>
    body{
      height: 100vh;
      background-image: linear-gradient(-45deg, rgba(10,54,65,1), rgb(15, 62, 74),rgb(29, 83, 96),rgb(53, 122, 139), rgb(51, 143, 163));
      background-size: 200%;
      animation: gradient 10s infinite alternate;
    }
    @keyframes gradient {
      0% {background-position: left;}
      100% {background-position: right;}
      }
    
    main{
      display: grid;
      position: relative;
      row-gap: 50px;
      justify-content: center;
      align-content: center;
      top: 10vw;
      font-family: "Julius Sans One", Arial, Helvetica, sans-serif;
      text-align: center;
    }
    .info{
      text-decoration: none;
      color: rgb(255, 255, 255);
      -webkit-text-stroke: 1px;
      border-radius: 50%;
      line-height: 1.5;
      text-wrap: balance;
    }
    .info svg{
      stroke: rgb(255, 255, 255);
      stroke-width: 2.5px;
    }
    main a{
      display: inline-block;
      margin: auto;
      text-decoration: none;
      color: black;
      -webkit-text-stroke: 1px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      padding: 1vw;
      border-radius: 8px;
      margin-top: -25px;
    }
    .loading{
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      margin: auto;
      width: clamp(200px, 20vw, 500px);
      height: 200px;
    }
    .loading div {
      box-sizing: border-box;
      place-self: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgb(0, 204, 255);
      animation: loader 4s  infinite alternate;
    }
    .loading div:nth-child(2){
      background: rgb(0, 204, 255);
      animation-delay: 1s ;
    }
    .loading div:nth-child(3){
      background: rgb(0, 204, 255);
      animation-delay: 2s;
    }
    .loading div:nth-child(4){
      background: rgb(0, 204, 255);
      animation-delay: 3s;
    }
   
    @keyframes loader {
      to {transform: translateY(-100px)}
      from {transform: translateY(0)}
    }
  </style>
</head>
